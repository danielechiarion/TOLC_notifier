name: TOLC_notifier
description: "App to notify when TOLC is open for registration"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  english_words: ^4.0.0
  provider: ^6.1.5
  # driver for sql database
  sqflite: ^2.3.0
  path: ^1.8.3
  # html page scraping
  html: ^0.15.4
  http: ^1.1.0
  # work manager for scheduled processes
  workmanager: ^0.5.2
  # logging dependencies
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true