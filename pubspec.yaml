name: TOLC_notifier
description: "App to notify when TOLC is open for registration"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  english_words: ^4.0.0
  provider: ^6.1.5
  # driver for sql database
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.3.0+2
  sqlite3_flutter_libs: ^0.5.20 # necessary to make it work also on windos
  # html page scraping
  html: ^0.15.4
  http: ^1.1.0
  # work manager for scheduled processes
  workmanager: ^0.5.2
  # logging dependencies
  logger: ^2.4.0
  # datetime dependencies
  intl: ^0.19.0
  # notification dependencies
  flutter_local_notifications: ^13.0.0
  timezone: ^0.9.0
  # package to manange interactive forms
  flutter_form_builder: ^9.5.0
  # dependency to manage local variables
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true